
<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pháo bông</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #050510;
    }
    canvas {
      display: block;
    }
    .hint {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.7);
      font-family: sans-serif;
      font-size: 14px;
      pointer-events: none;
      user-select: none;
    }
  </style>
</head>
<body>
  <div class="hint">Click chuột để bắn pháo bông</div>
  <canvas id="canvas"></canvas>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    let width, height;
    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const gravity = 0.04;
    const particles = [];

    // Một mảnh pháo sau khi nổ
    class Particle {
      constructor(x, y, color) {
        this.x = x;
        this.y = y;
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 5 + 1;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;
        this.color = color;
        this.life = 1; // độ trong, giảm dần
        this.decay = Math.random() * 0.015 + 0.01;
      }
      update() {
        this.vy += gravity;
        this.x += this.vx;
        this.y += this.vy;
        this.life -= this.decay;
      }
      draw() {
        ctx.globalAlpha = Math.max(this.life, 0);
        ctx.beginPath();
        ctx.arc(this.x, this.y, 2.5, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
      }
    }

    // Tạo một vụ nổ tại (x, y)
    function explode(x, y) {
      const hue = Math.floor(Math.random() * 360);
      const count = 80;
      for (let i = 0; i < count; i++) {
        const color = `hsl(${hue + Math.random() * 40 - 20}, 100%, 60%)`;
        particles.push(new Particle(x, y, color));
      }
    }

    // Bắn pháo khi click
    canvas.addEventListener('click', (e) => {
      explode(e.clientX, e.clientY);
    });

    // Tự bắn pháo ngẫu nhiên cho vui mắt
    setInterval(() => {
      const x = Math.random() * width;
      const y = Math.random() * height * 0.5;
      explode(x, y);
    }, 900);

    function loop() {
      // Vệt mờ tạo hiệu ứng đuôi
      ctx.globalAlpha = 1;
      ctx.fillStyle = 'rgba(5, 5, 16, 0.2)';
      ctx.fillRect(0, 0, width, height);

      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.update();
        p.draw();
        if (p.life <= 0) particles.splice(i, 1);
      }

      requestAnimationFrame(loop);
    }
    loop();
  </script>
</body>
</html>
